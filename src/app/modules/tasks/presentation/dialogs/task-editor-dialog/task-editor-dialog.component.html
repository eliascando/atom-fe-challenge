<h2 mat-dialog-title>{{ dialogTitle }}</h2>

<mat-dialog-content>
  <form class="dialog-form" [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline">
      <mat-label>Título</mat-label>
      <input appAutofocus matInput formControlName="title" autocomplete="off" />
      <mat-error *ngIf="form.controls.title.hasError('required')">Ingresa un título.</mat-error>
      <mat-error *ngIf="form.controls.title.hasError('minlength')">Mínimo 3 caracteres.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Descripción</mat-label>
      <textarea matInput rows="4" formControlName="description"></textarea>
      <mat-hint align="end">{{ form.controls.description.value.length }}/500</mat-hint>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button mat-dialog-close>Cancelar</button>
  <button type="button" mat-flat-button color="primary" (click)="submit()">{{ submitLabel }}</button>
</mat-dialog-actions>
